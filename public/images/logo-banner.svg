  <path d="M180 140 L270 250 L180 360 L90 250 Z" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>
  <text x="180" y="275" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="900" font-size="100" fill="url(#gold)" text-anchor="middle" letter-spacing="-5">EE</text>

  <!-- Text -->
  <text x="360" y="220" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="800" font-size="72" fill="url(#gold)" letter-spacing="4">ELITE EDGE</text>
  <text x="360" y="280" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="42" fill="#8a8fa0" letter-spacing="10">SPORTS TIPS</text>

