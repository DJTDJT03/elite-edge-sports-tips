    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c555"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8902f"/>
