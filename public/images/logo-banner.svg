  <!-- Stats -->
  <text x="360" y="400" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="600" font-size="20" fill="#d4a843" letter-spacing="2">86% Racing Strike Rate  |  +230 Units Profit  |  Free Daily Tips</text>

