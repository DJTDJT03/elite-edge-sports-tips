  </defs>

  <!-- Background -->
  <rect width="1500" height="500" rx="20" fill="url(#bg)"/>
  <rect x="2" y="2" width="1496" height="496" rx="18" fill="none" stroke="url(#gold)" stroke-width="2" opacity="0.3"/>

  <!-- Logo icon -->
