<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e8c555"/>
      <stop offset="50%" stop-color="#d4a843"/>
      <stop offset="100%" stop-color="#b8902f"/>
    </linearGradient>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141828"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="400" cy="400" r="390" fill="url(#darkGrad)" filter="url(#shadow)"/>
  <circle cx="400" cy="400" r="385" fill="none" stroke="url(#goldGrad)" stroke-width="3"/>

  <!-- Inner diamond shape -->
  <path d="M400 120 L620 400 L400 680 L180 400 Z" fill="none" stroke="url(#goldGrad)" stroke-width="4" opacity="0.3"/>
  <path d="M400 160 L590 400 L400 640 L210 400 Z" fill="none" stroke="url(#goldGrad)" stroke-width="2.5" opacity="0.15"/>

  <!-- EE Monogram -->
  <text x="400" y="360" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="900" font-size="200" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="-10" filter="url(#glow)">EE</text>

  <!-- Divider line -->
  <line x1="260" y1="400" x2="540" y2="400" stroke="url(#goldGrad)" stroke-width="2" opacity="0.6"/>

  <!-- ELITE EDGE text -->
  <text x="400" y="470" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="700" font-size="52" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="12">ELITE EDGE</text>

  <!-- SPORTS TIPS text -->
  <text x="400" y="530" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="400" font-size="36" fill="#8a8fa0" text-anchor="middle" letter-spacing="16">SPORTS TIPS</text>

  <!-- Tagline -->
  <text x="400" y="600" font-family="Inter, Helvetica, Arial, sans-serif" font-weight="300" font-size="20" fill="#6b7280" text-anchor="middle" letter-spacing="6">DATA-DRIVEN BETTING INTELLIGENCE</text>

  <!-- Subtle decorative dots -->
  <circle cx="245" cy="400" r="3" fill="#d4a843" opacity="0.6"/>
  <circle cx="555" cy="400" r="3" fill="#d4a843" opacity="0.6"/>
</svg>
